<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>观澜 · Web 宿主</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<link rel="apple-touch-icon" href="/static/logo.png">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<!-- 顶栏按钮图标雪碧（线性墨笔风，stroke=currentColor 随澜色/hover 变色，见 app.css .ico）。 -->
<svg class="icon-sprite" aria-hidden="true" focusable="false" width="0" height="0">
  <symbol id="i-new" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
  <symbol id="i-history" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></symbol>
  <symbol id="i-feed" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></symbol>
  <symbol id="i-staging" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></symbol>
  <symbol id="i-ingest" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
  <symbol id="i-heal" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></symbol>
  <!-- backfill（P4.8）：水滴沉入横线/层，贴「澜」沉淀意象。 -->
  <symbol id="i-backfill" viewBox="0 0 24 24"><path d="M12 2s5 5.5 5 9a5 5 0 0 1-10 0c0-3.5 5-9 5-9z"/><line x1="4" y1="21" x2="20" y2="21"/></symbol>
  <!-- audit（P4.12）：放大镜含勾，贴「复核漂移源」意象。 -->
  <symbol id="i-audit" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="7.5"/><line x1="21" y1="21" x2="15.8" y2="15.8"/><polyline points="7.5 10.5 9.8 12.8 13.5 8.2"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></symbol>
  <symbol id="i-health" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></symbol>
  <symbol id="i-lint" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></symbol>
  <symbol id="i-graph" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></symbol>
  <!-- composer 图标（＋ / ↑ / ■）：粗描边，stroke=currentColor。 -->
  <symbol id="i-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></symbol>
  <symbol id="i-up" viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="5"/><polyline points="6 11 12 5 18 11"/></symbol>
  <symbol id="i-stop" viewBox="0 0 24 24"><rect x="6.5" y="6.5" width="11" height="11" rx="2.5"/></symbol>
  <symbol id="i-folder" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2.5h8a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></symbol>
  <!-- 语言切换（P4.7）：地球 + 经纬线。 -->
  <symbol id="i-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="3" y1="12" x2="21" y2="12"/><path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18z"/></symbol>
  <!-- 暂存区行内动作图标（预览/修订/断链检查/晋级/解析）：同线性墨笔风。 -->
  <symbol id="i-eye" viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></symbol>
  <symbol id="i-pencil" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></symbol>
  <symbol id="i-link" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5"/></symbol>
  <symbol id="i-arrow-right" viewBox="0 0 24 24"><line x1="4" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></symbol>
  <symbol id="i-play" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></symbol>
</svg>
<header class="topbar">
  <div class="brand">
    <img class="brand-icon" src="/static/logo.png" alt="观澜 logo" width="38" height="38">
    <span class="wordmark">
      <span class="logo">观澜</span>
      <span class="tagline" data-i18n="tagline">观水有术，必观其澜</span>
    </span>
  </div>
  <nav class="actions">
    <span id="mode-badge" class="mode-badge" data-i18n-title="tip.modeBadge" title="当前会话姿态（/mode 切换）">read-only</span>
    <span class="act-sep" aria-hidden="true"></span>
    <button id="chat-new" class="btn" data-i18n-title="tip.newChat" title="开启新会话（清空上下文）">
      <svg class="ico"><use href="#i-new"/></svg><span class="btn-zh" data-i18n="btn.newChat">新会话</span></button>
    <button id="history-btn" class="btn" data-i18n-title="tip.history" title="历史会话：列出、点开续聊、删除">
      <svg class="ico"><use href="#i-history"/></svg><span class="btn-zh" data-i18n="btn.history">历史</span></button>
    <span class="act-sep" aria-hidden="true"></span>
    <button id="feed-btn" class="btn" data-i18n-title="tip.feed" title="投喂：把一篇素材粘贴存进 raw/">
      <svg class="ico"><use href="#i-feed"/></svg><span class="btn-zh" data-i18n="btn.feed">投喂</span></button>
    <button id="staging-btn" class="btn" data-i18n-title="tip.staging" title="暂存区：浏览上传/派生物，审阅·修订·晋级为源 → ingest">
      <svg class="ico"><use href="#i-staging"/></svg><span class="btn-zh" data-i18n="btn.staging">暂存区</span></button>
    <button id="ingest-btn" class="btn" data-i18n-title="tip.ingest" title="ingest：从 raw/ 选一篇触发入库 → wiki/">
      <svg class="ico"><use href="#i-ingest"/></svg><span class="btn-zh" data-i18n="btn.ingest">入库</span></button>
    <button id="heal-btn" class="btn" data-i18n-title="tip.heal" title="heal：补全高频缺失实体，缺页物化，走写门禁">
      <svg class="ico"><use href="#i-heal"/></svg><span class="btn-zh" data-i18n="btn.heal">补全</span></button>
    <button id="backfill-btn" class="btn" data-i18n-title="tip.backfill" title="backfill：把一次好问答沉淀为 wiki/syntheses/ 综合页，走写门禁">
      <svg class="ico"><use href="#i-backfill"/></svg><span class="btn-zh" data-i18n="btn.backfill">回填</span></button>
    <button id="audit-btn" class="btn" data-i18n-title="tip.audit" title="audit：复核 raw 已变但 wiki 未重综合的漂移源，走写门禁">
      <svg class="ico"><use href="#i-audit"/></svg><span class="btn-zh" data-i18n="btn.audit">审计</span></button>
    <span class="act-sep" aria-hidden="true"></span>
    <button data-report="check" class="btn" data-i18n-title="tip.check" title="check：确定性校验（frontmatter / 断链 / 源）">
      <svg class="ico"><use href="#i-check"/></svg><span class="btn-zh" data-i18n="btn.check">校验</span></button>
    <button data-report="health" class="btn" data-i18n-title="tip.health" title="health：stub 页 + 索引↔磁盘同步（建议性）">
      <svg class="ico"><use href="#i-health"/></svg><span class="btn-zh" data-i18n="btn.health">健康</span></button>
    <button data-report="lint" class="btn" data-i18n-title="tip.lint" title="lint：孤页 / 断链 / 缺失实体（建议性）">
      <svg class="ico"><use href="#i-lint"/></svg><span class="btn-zh" data-i18n="btn.lint">巡检</span></button>
    <button id="graph-btn" class="btn" data-i18n-title="tip.graph" title="graph：构建并打开知识图谱视图">
      <svg class="ico"><use href="#i-graph"/></svg><span class="btn-zh" data-i18n="btn.graph">图谱</span></button>
    <span class="act-sep" aria-hidden="true"></span>
    <!-- 语言切换（P4.7）：显「目标语言」码（zh 态 EN / en 态 中），点击翻转 zh⇄en。 -->
    <button id="lang-btn" class="btn" data-i18n-title="tip.lang" data-i18n-aria="tip.lang"
            title="切换界面语言 中文 / English" aria-label="切换界面语言">
      <svg class="ico"><use href="#i-globe"/></svg><span id="lang-label" class="btn-zh">EN</span></button>
  </nav>
</header>

<!-- 主体：左=对话内容 / 右=Wiki(搜索+内容) / 底部满宽=对话输入框 -->
<main class="layout">
  <section class="chat" aria-label="对话内容">
    <div id="chat-log" class="chat-log"></div>
  </section>

  <div id="col-split" class="col-split" role="separator" aria-orientation="vertical"
       tabindex="0" title="拖动调整左右宽度（双击复位）" aria-label="调整左右两栏宽度"></div>

  <aside class="wiki" aria-label="Wiki">
    <div class="wiki-bar">
      <button id="wiki-home" class="nav-btn" data-i18n="wiki.home" data-i18n-title="tip.wikiHome" title="回到 Concept 目录">⌂ Home</button>
      <button id="wiki-back" class="nav-btn" data-i18n-title="tip.wikiBack" title="回退" disabled>←</button>
      <button id="wiki-fwd" class="nav-btn" data-i18n-title="tip.wikiFwd" title="往前" disabled>→</button>
      <input id="wiki-search" type="search" data-i18n-placeholder="wiki.search" placeholder="Wiki Search…" autocomplete="off">
    </div>
    <div id="wiki-view" class="wiki-view"></div>
  </aside>

  <!-- 对话输入框（底部满宽，OpenAI 风格圆角 composer）：附件徽章 · 文本域 · 底栏(＋上传 / 发送) -->
  <form id="chat-form" class="chat-form composer" aria-label="对话输入框">
    <input id="file-input" type="file" multiple hidden>
    <ul id="attach-list" class="attach-list" hidden aria-label="待发送附件"></ul>
    <div class="composer-wrap">
      <textarea id="chat-input" rows="1" data-i18n-placeholder="composer.placeholder" placeholder="向 agent 提问（只读，跨轮保留上下文）… 回车发送，Shift-Enter 换行，输入 / 看命令"></textarea>
    </div>
    <div class="composer-bar">
      <button type="button" id="attach-btn" class="composer-attach"
              data-i18n-title="tip.attach" data-i18n-aria="aria.attach"
              title="上传文件作附件：以 <attachment> 标签随消息发给 agent；图像直接给模型看（不支持视觉时自动降级为文本引用）"
              aria-label="添加附件"><svg class="composer-ico"><use href="#i-plus"/></svg></button>
      <button type="submit" id="chat-send" class="composer-send" data-i18n-title="tip.send" data-i18n-aria="chat.send" title="发送（Enter）" aria-label="发送"><svg class="composer-ico ico-send"><use href="#i-up"/></svg><svg class="composer-ico ico-stop"><use href="#i-stop"/></svg></button>
    </div>
  </form>
</main>

<!-- 报告 / 作业 / ingest 选择浮层 -->
<div id="overlay" class="overlay hidden">
  <div class="overlay-card">
    <div class="overlay-head">
      <h3 id="overlay-title">报告</h3>
      <button id="overlay-close" data-i18n-aria="aria.overlayClose" aria-label="关闭">×</button>
    </div>
    <div id="overlay-body" class="overlay-body"></div>
  </div>
</div>

<script src="/static/i18n.js"></script>
<!-- 原 app.js 按关注点拆分为多个经典脚本，共享全局作用域（非 ES module）。
     硬性次序仅两条：① core 必须最先（其 `const $` 等被各文件在载入期顶层 $(...) 接线时引用，
     晚载入会 TDZ 报错）；② boot 必须最后（其顶层启动代码跨全部关注点引用声明）。
     中间六个文件只是关注点分组、彼此无载入期依赖（函数声明全局提升、共享 let 仅在运行期互访）。 -->
<script src="/static/core.js"></script>
<script src="/static/i18n_apply.js"></script>
<!-- mermaid 渲染增强（P4.13）：定义全局 enhanceMermaid，须在其调用者 wiki/jobs/staging/chat 之前载入。 -->
<script src="/static/mermaid_enhance.js"></script>
<script src="/static/wiki.js"></script>
<script src="/static/reports.js"></script>
<script src="/static/jobs.js"></script>
<script src="/static/staging.js"></script>
<script src="/static/attach.js"></script>
<script src="/static/chat.js"></script>
<script src="/static/boot.js"></script>
</body>
</html>
