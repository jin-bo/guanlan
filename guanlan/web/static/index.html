<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>观澜 · Web 宿主</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<link rel="apple-touch-icon" href="/static/logo.png">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <img class="brand-icon" src="/static/logo.png" alt="观澜 logo" width="38" height="38">
    <span class="wordmark">
      <span class="logo">观澜</span>
      <span class="tagline">观水有术，必观其澜</span>
    </span>
  </div>
  <nav class="actions">
    <button id="chat-new" title="开启新会话（清空上下文）">新会话</button>
    <button id="history-btn" title="历史会话：列出、点开续聊、删除">历史会话</button>
    <button id="feed-btn" title="投喂：把一篇素材粘贴存进 raw/">投喂</button>
    <button id="ingest-btn" title="从 raw/ 选一篇触发 ingest">ingest</button>
    <button data-report="check">check</button>
    <button data-report="health">health</button>
    <button data-report="lint">lint</button>
    <button id="graph-btn">graph</button>
  </nav>
</header>

<!-- 主体：左=对话内容 / 右=Wiki(搜索+内容) / 底部满宽=对话输入框 -->
<main class="layout">
  <section class="chat" aria-label="对话内容">
    <div id="chat-log" class="chat-log"></div>
  </section>

  <div id="col-split" class="col-split" role="separator" aria-orientation="vertical"
       tabindex="0" title="拖动调整左右宽度（双击复位）" aria-label="调整左右两栏宽度"></div>

  <aside class="wiki" aria-label="Wiki">
    <div class="wiki-bar">
      <button id="wiki-home" class="nav-btn" title="回到 Concept 目录">⌂ Home</button>
      <button id="wiki-back" class="nav-btn" title="回退" disabled>←</button>
      <button id="wiki-fwd" class="nav-btn" title="往前" disabled>→</button>
      <input id="wiki-search" type="search" placeholder="Wiki Search…" autocomplete="off">
    </div>
    <div id="wiki-view" class="wiki-view"></div>
  </aside>

  <form id="chat-form" class="chat-form" aria-label="对话输入框">
    <textarea id="chat-input" rows="2" placeholder="向 agent 提问（只读，跨轮保留上下文）… 回车发送，Option-Enter 换行"></textarea>
    <button type="submit" id="chat-send">发送</button>
  </form>
</main>

<!-- 报告 / 作业 / ingest 选择浮层 -->
<div id="overlay" class="overlay hidden">
  <div class="overlay-card">
    <div class="overlay-head">
      <h3 id="overlay-title">报告</h3>
      <button id="overlay-close" aria-label="关闭">×</button>
    </div>
    <div id="overlay-body" class="overlay-body"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
