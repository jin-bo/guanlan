<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>观澜 · Web 宿主</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="logo">观澜</span>
    <span class="tagline">观水有术，必观其澜</span>
  </div>
  <nav class="actions">
    <button id="chat-new" title="开启新会话（清空上下文）">新会话</button>
    <button id="ingest-btn" title="从 raw/ 选一篇触发 ingest">ingest</button>
    <button data-report="check">check</button>
    <button data-report="health">health</button>
    <button data-report="lint">lint</button>
    <button id="graph-btn">graph</button>
  </nav>
</header>

<!-- 主体：左=对话内容 / 右=Wiki(搜索+内容) / 底部满宽=对话输入框 -->
<main class="layout">
  <section class="chat" aria-label="对话内容">
    <div id="chat-log" class="chat-log"></div>
  </section>

  <aside class="wiki" aria-label="Wiki">
    <div class="wiki-search">
      <input id="wiki-search" type="search" placeholder="Wiki Search — 搜索页面标题 / 路径…" autocomplete="off">
      <div id="wiki-results" class="wiki-results"></div>
    </div>
    <article id="wiki-body" class="wiki-body">
      <p class="muted">搜索并选择一张 wiki 页面查看；正文里的 [[链接]] 可点击导航。</p>
    </article>
  </aside>

  <form id="chat-form" class="chat-form" aria-label="对话输入框">
    <textarea id="chat-input" rows="2" placeholder="向 agent 提问（只读，跨轮保留上下文）…"></textarea>
    <button type="submit" id="chat-send">发送</button>
  </form>
</main>

<!-- 报告 / 作业 / ingest 选择浮层 -->
<div id="overlay" class="overlay hidden">
  <div class="overlay-card">
    <div class="overlay-head">
      <h3 id="overlay-title">报告</h3>
      <button id="overlay-close" aria-label="关闭">×</button>
    </div>
    <div id="overlay-body" class="overlay-body"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
