name: CI

# 推到 main 或对 main 发 PR 时跑：lint + 全量测试。
# 全程离线——测试用 fake runner / monkeypatch，不打真实 LLM，无需任何 API key。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支/PR 的新推送取消旧的在跑任务，省额度。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # 默认 job 超时是 6h；卡死的跑（死锁/等网络）别白烧满额度——全套测试 ~1 分钟，15 分钟极宽裕。
    timeout-minutes: 15
    # requires-python = ">=3.10"：在下限 3.10 到 3.12 全跑，确保最低支持版本不破。
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: 装 uv（带依赖缓存）
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: 装 Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # ruff 用 uvx 临时拉，不进 lock；与本地 `uvx ruff check` 一致。
      - name: Lint（ruff）
        run: uvx ruff check guanlan tests

      # --extra web 装上 fastapi/uvicorn/markdown，--extra mcp 装上 mcp SDK，否则 test_web.py /
      # test_aliases.py / test_mcp.py 会被 importorskip 跳过；dev 组（pytest）uv sync 默认带上。
      - name: 装依赖
        run: uv sync --extra web --extra mcp --python ${{ matrix.python-version }}

      - name: 跑测试
        run: uv run --extra web --extra mcp --python ${{ matrix.python-version }} pytest -q

  # 改 workflow 时校验：YAML 语法 / action input / ${{ }} 表达式，并对 run: 里的内联 shell 跑 shellcheck
  # （release.yml 那段抽 CHANGELOG 的 awk/bash 由此受检）。单跑一次、不进 Python 矩阵。
  # 钉到 actionlint v1.7.12 的镜像 digest（SHA 钉版、可复现，非浮动 :latest）；镜像自带 shellcheck。
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: actionlint
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color
